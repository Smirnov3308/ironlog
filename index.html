<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="IRONLOG">
  <meta name="theme-color" content="#09090b">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>IRONLOG</title>
  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; background: #09090b; }
    body { overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;


// ── PROGRAM CONFIG ───────────────────────────────────────────────────────────
// Exercises with `alts` can be swapped. Each alt has its own id/weight/step.
// `defaultAlt` = index used by default (0 = first alt).
const PROGRAM = {
  A: {
    label: "Day A",
    muscles: "Chest · Back · Legs",
    exercises: [
      { slot: "bench_a", sets: 4, defaultAlt: 0, alts: [
        { id: "bench_a", name: "Bench Press", reps: 10, weight: 60, step: 2.5 },
      ]},
      {
        slot: "pull_a", sets: 4, defaultAlt: 0,
        alts: [
          { id: "row_a", name: "Compound Row", reps: 10, weight: 60, step: 10, progressReps: 12 },
          { id: "vlat_a", name: "Vertical", reps: 10, weight: 60, step: 10 },
          { id: "pullup_a", name: "Pull-ups", reps: "max", weight: null, step: null },
        ],
      },
      { slot: "fly_a", sets: 4, defaultAlt: 0, alts: [
        { id: "fly_a", name: "Pec Fly", reps: 12, weight: 60, step: 3.75, progressReps: 14 },
      ]},
      { slot: "legpress_a", sets: 4, defaultAlt: 0, alts: [
        { id: "legpress_a", name: "Leg Press", reps: 15, weight: 52.5, step: 3.75 },
      ]},
    ],
  },
  B: {
    label: "Day B",
    muscles: "Chest · Back · Shoulders · Arms",
    exercises: [
      { slot: "bench_b", sets: 4, defaultAlt: 0, alts: [
        { id: "bench_b", name: "Bench Press", reps: 10, weight: 60, step: 2.5 },
      ]},
      {
        slot: "pull_b", sets: 4, defaultAlt: 1,
        alts: [
          { id: "pullup_b", name: "Pull-ups", reps: "max", weight: null, step: null },
          { id: "vlat_b", name: "Vertical", reps: 10, weight: 60, step: 10 },
          { id: "hrow_b", name: "Compound Row", reps: 10, weight: 60, step: 10, progressReps: 12 },
        ],
      },
      { slot: "lateral_b", sets: 4, defaultAlt: 0, alts: [
        { id: "lateral_b", name: "Lateral Raise", reps: 15, weight: 32, step: 5, progressReps: 18 },
      ]},
      { slot: "bicep_b", sets: 4, defaultAlt: 0, alts: [
        { id: "bicep_b", name: "Bicep Curl", reps: 8, weight: 12, step: 1 },
      ]},
    ],
  },
  C: {
    label: "Day C",
    muscles: "Chest · Shoulders · Core · Back",
    exercises: [
      { slot: "bench_c", sets: 4, defaultAlt: 0, alts: [
        { id: "bench_c", name: "Bench Press", reps: 10, weight: 60, step: 2.5 },
      ]},
      { slot: "shpress_c", sets: 4, defaultAlt: 0, alts: [
        { id: "shpress_c", name: "Shoulder Press", reps: 12, weight: 33.75, step: 3.75 },
      ]},
      { slot: "crunch_c", sets: 4, defaultAlt: 0, alts: [
        { id: "crunch_c", name: "Cable Crunches", reps: 15, weight: 32.5, step: 3.75 },
      ]},
      {
        slot: "pull_c", sets: 4, defaultAlt: 2,
        alts: [
          { id: "pullup_c", name: "Pull-ups", reps: "max", weight: null, step: null },
          { id: "vlat_c", name: "Vertical", reps: 10, weight: 60, step: 10 },
          { id: "hrow_c", name: "Compound Row", reps: 10, weight: 60, step: 10, progressReps: 12 },
        ],
      },
    ],
  },
};
Object.freeze(PROGRAM);

// Resolve a slot definition → flat exercise object using current subs state
function resolveEx(exDef, subs, customAlts = {}) {
  const allAlts = [...exDef.alts, ...(customAlts[exDef.slot] || [])];
  const selected = subs[exDef.slot];
  let alt;
  if (typeof selected === 'number') alt = exDef.alts[selected] || allAlts[0];
  else if (typeof selected === 'string') alt = allAlts.find((a) => a.id === selected) || allAlts[0];
  else alt = allAlts[exDef.defaultAlt] || allAlts[0];
  return { ...alt, sets: exDef.sets, slot: exDef.slot, allAlts, defaultAlt: exDef.defaultAlt };
}

// Collect all concrete weighted exercises (for steps defaults)
function getAllWeighted() {
  const all = [];
  Object.values(PROGRAM).forEach((d) =>
    d.exercises.forEach((exDef) => {
      exDef.alts.forEach((alt) => {
        if (alt.weight !== null && alt.step !== null && !all.find((x) => x.id === alt.id))
          all.push({ ...alt, sets: exDef.sets });
      });
    })
  );
  return all;
}

const ALL_WEIGHTED = getAllWeighted();
const DEFAULT_STEPS = Object.fromEntries(
  ALL_WEIGHTED.map((e) => [e.id, { step: e.step, progressReps: e.progressReps ?? e.reps }])
);

const ALL_EXERCISES = [];
Object.values(PROGRAM).forEach((d) =>
  d.exercises.forEach((exDef) => {
    exDef.alts.forEach((alt) => {
      if (!ALL_EXERCISES.find((e) => e.name === alt.name)) ALL_EXERCISES.push(alt);
    });
  })
);

const DEFAULT_SUBS = {};
Object.values(PROGRAM).forEach((d) =>
  d.exercises.forEach((exDef) => {
    if (exDef.alts) DEFAULT_SUBS[exDef.slot] = exDef.defaultAlt;
  })
);

const DEFAULT_WEIGHTS = {};
Object.values(PROGRAM).forEach((d) =>
  d.exercises.forEach((exDef) => {
    exDef.alts.forEach((alt) => { if (alt.weight !== null) DEFAULT_WEIGHTS[alt.id] = alt.weight; });
  })
);

const DEFAULT_STATE = {
  weights: DEFAULT_WEIGHTS,
  steps: DEFAULT_STEPS,
  subs: DEFAULT_SUBS,
  customAlts: {},
  history: [],
};

const ACCENT = { A: "#22c55e", B: "#3b82f6", C: "#f97316" };

// ── STORAGE ──────────────────────────────────────────────────────────────────
const STORAGE_KEY = "ironlog_v1";

async function loadFromStorage() {
  // Claude artifact storage
  try { const r = await window.storage.get(STORAGE_KEY); if (r) return JSON.parse(r.value); } catch {}
  // localStorage fallback (GitHub Pages, standalone)
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch {}
  // Migration from older keys
  for (const oldKey of ["wt_v6", "wt_v5", "wt_v4"]) {
    try { const r = await window.storage.get(oldKey); if (r) return JSON.parse(r.value); } catch {}
    try { const r = localStorage.getItem(oldKey); if (r) return JSON.parse(r); } catch {}
  }
  return null;
}
async function persistState(s) {
  const json = JSON.stringify(s);
  try { await window.storage.set(STORAGE_KEY, json); } catch {}
  try { localStorage.setItem(STORAGE_KEY, json); } catch {}
}

// ── EXPORT ───────────────────────────────────────────────────────────────────
function formatWorkout(rec) {
  let txt = rec.label + "\n";
  rec.exercises.forEach((ex) => {
    txt += ex.name + "\n";
    ex.sets.forEach((s) => {
      if (!s.done) return;
      const w = ex.weight != null ? ex.weight : "BW";
      const r = s.reps === "" ? "?" : s.reps;
      txt += `${w} - ${r}\n`;
    });
  });
  return txt.trimEnd();
}

async function copyText(text) {
  try { await navigator.clipboard.writeText(text); return true; } catch {}
  const ta = document.createElement("textarea");
  ta.value = text; ta.style.cssText = "position:fixed;opacity:0";
  document.body.appendChild(ta); ta.select();
  const ok = document.execCommand("copy");
  document.body.removeChild(ta); return ok;
}

// ── REST TIMER ───────────────────────────────────────────────────────────────
function RestTimer({ accent, restartRef }) {
  const [startedAt, setStartedAt] = useState(null); // timestamp or null
  const [seconds, setSeconds] = useState(0);
  const intervalRef = useRef(null);
  const TARGET = 90;
  const running = startedAt !== null;

  useEffect(() => {
    if (running) {
      const tick = () => setSeconds(Math.floor((Date.now() - startedAt) / 1000));
      tick();
      intervalRef.current = setInterval(tick, 500);
    } else { clearInterval(intervalRef.current); }
    return () => clearInterval(intervalRef.current);
  }, [startedAt]);

  // Also sync on visibility change (returning from background)
  useEffect(() => {
    const onVisible = () => {
      if (startedAt) setSeconds(Math.floor((Date.now() - startedAt) / 1000));
    };
    document.addEventListener("visibilitychange", onVisible);
    return () => document.removeEventListener("visibilitychange", onVisible);
  }, [startedAt]);

  const restart = useCallback(() => { setStartedAt(Date.now()); setSeconds(0); }, []);
  const stop = () => { setStartedAt(null); };

  useEffect(() => { if (restartRef) restartRef.current = restart; }, [restart, restartRef]);
  const pct = Math.min(seconds / TARGET, 1);
  const mm = String(Math.floor(seconds / 60)).padStart(2, "0");
  const ss = String(seconds % 60).padStart(2, "0");
  const ready = seconds >= TARGET;

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 12, background: "#111113", border: `1px solid ${running ? accent + "33" : "#1e1e22"}`, borderRadius: 10, padding: "10px 14px", transition: "border-color 0.3s" }}>
      <div onClick={restart} style={{
        display: "flex", alignItems: "center", gap: 12, flex: 1, cursor: "pointer",
        WebkitTapHighlightColor: "transparent",
      }}>
        <div style={{ position: "relative", width: 36, height: 36, flexShrink: 0 }}>
          <svg viewBox="0 0 36 36" style={{ transform: "rotate(-90deg)" }}>
            <circle cx="18" cy="18" r="15" fill="none" stroke="#1e1e22" strokeWidth="3" />
            <circle cx="18" cy="18" r="15" fill="none" stroke={ready ? accent : "#555"} strokeWidth="3" strokeLinecap="round" strokeDasharray={`${pct * 94.25} 94.25`} style={{ transition: "stroke-dasharray 0.3s" }} />
          </svg>
          <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 8, fontWeight: 700, color: ready ? accent : "#666", fontFamily: "monospace" }}>
            {ready ? "GO" : ""}
          </div>
        </div>
        <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 22, fontWeight: 700, color: ready ? accent : (running ? "#ccc" : "#555"), letterSpacing: 2, minWidth: 70, transition: "color 0.3s" }}>
          {mm}:{ss}
        </div>
      </div>
      {running && (
        <button onClick={stop} style={{
          background: "#1e1e22", border: "1px solid #2a2a2e", color: "#666",
          borderRadius: 8, padding: "6px 12px", cursor: "pointer",
          fontSize: 10, fontWeight: 700, fontFamily: "inherit", letterSpacing: 1,
          WebkitTapHighlightColor: "transparent",
        }}>STOP</button>
      )}
      {!running && (
        <div onClick={restart} style={{ cursor: "pointer", fontSize: 11, color: "#444", fontWeight: 600, letterSpacing: 1, WebkitTapHighlightColor: "transparent" }}>
          {seconds > 0 ? "↺" : "START"}
        </div>
      )}
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [state, setStateRaw] = useState(DEFAULT_STATE);
  const [loaded, setLoaded] = useState(false);
  const [activeDay, setActiveDay] = useState(null);
  const [session, setSession] = useState(null);
  const [view, setView] = useState("home");
  const [toast, setToast] = useState(null);
  const [confirmReset, setConfirmReset] = useState(false);

  useEffect(() => {
    loadFromStorage().then((stored) => {
      if (stored) {
        setStateRaw({
          ...DEFAULT_STATE, ...stored,
          steps: { ...DEFAULT_STEPS, ...(stored.steps || {}) },
          subs: { ...DEFAULT_SUBS, ...(stored.subs || {}) },
          customAlts: stored.customAlts || {},
          weights: { ...DEFAULT_WEIGHTS, ...(stored.weights || {}) },
        });
      }
      setLoaded(true);
    });
  }, []);

  const setState = useCallback((updater) => {
    setStateRaw((prev) => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      persistState(next);
      return next;
    });
  }, []);

  function showToast(msg, color = "#22c55e") {
    setToast({ msg, color });
    setTimeout(() => setToast(null), 3500);
  }

  function getDayExercises(dayKey, subs, customAlts = {}) {
    return PROGRAM[dayKey].exercises.map((exDef) => resolveEx(exDef, subs, customAlts));
  }

  function startDay(dayKey) {
    const exercises = getDayExercises(dayKey, state.subs, state.customAlts);
    setActiveDay(dayKey);
    setSession(exercises.map((ex) => ({
      exId: ex.id,
      slot: ex.slot || null,
      weight: state.weights[ex.id] ?? ex.weight,
      sets: Array.from({ length: ex.sets }, () => ({
        done: false,
        reps: ex.reps === "max" ? "" : ex.reps,
      })),
    })));
    setView("workout");
  }

  function swapExercise(exIdx, newAltId) {
    const exDef = PROGRAM[activeDay].exercises[exIdx];
    const allAlts = [...exDef.alts, ...(state.customAlts[exDef.slot] || [])];
    const newAlt = allAlts.find((a) => a.id === newAltId) || allAlts[0];
    setState((prev) => ({ ...prev, subs: { ...prev.subs, [exDef.slot]: newAltId } }));

    const resolved = { ...newAlt, sets: exDef.sets };
    setSession((s) => s.map((ex, i) => {
      if (i !== exIdx) return ex;
      return {
        exId: resolved.id, slot: exDef.slot,
        weight: state.weights[resolved.id] ?? resolved.weight,
        sets: Array.from({ length: resolved.sets }, () => ({
          done: false,
          reps: resolved.reps === "max" ? "" : resolved.reps,
        })),
      };
    }));
  }

  function addCustomAlt(exIdx, name) {
    const exDef = PROGRAM[activeDay].exercises[exIdx];
    const currentEx = resolveEx(exDef, state.subs, state.customAlts);
    const sessionEx = session[exIdx];
    const newId = "custom_" + Date.now() + "_" + Math.random().toString(36).slice(2, 6);
    const newAlt = {
      id: newId, name,
      reps: currentEx.reps === "max" ? "max" : currentEx.reps,
      weight: sessionEx.weight,
      step: state.steps[currentEx.id]?.step || currentEx.step,
      progressReps: currentEx.progressReps,
    };
    setState((prev) => ({
      ...prev,
      customAlts: { ...prev.customAlts, [exDef.slot]: [...(prev.customAlts[exDef.slot] || []), newAlt] },
      subs: { ...prev.subs, [exDef.slot]: newId },
    }));
    setSession((s) => s.map((ex, i) => {
      if (i !== exIdx) return ex;
      return {
        exId: newId, slot: exDef.slot, weight: sessionEx.weight,
        sets: Array.from({ length: exDef.sets }, () => ({
          done: false, reps: newAlt.reps === "max" ? "" : newAlt.reps,
        })),
      };
    }));
  }

  function removeCustomAlt(slot, altId) {
    setState((prev) => {
      const newCustomAlts = { ...prev.customAlts };
      newCustomAlts[slot] = (newCustomAlts[slot] || []).filter((a) => a.id !== altId);
      if (newCustomAlts[slot].length === 0) delete newCustomAlts[slot];
      const newSubs = { ...prev.subs };
      if (newSubs[slot] === altId) delete newSubs[slot];
      return { ...prev, customAlts: newCustomAlts, subs: newSubs };
    });
  }

  function adoptExercise(exIdx, ex) {
    const exDef = PROGRAM[activeDay].exercises[exIdx];
    const altEntry = { id: ex.id, name: ex.name, reps: ex.reps, weight: ex.weight, step: ex.step, progressReps: ex.progressReps };
    setState((prev) => ({
      ...prev,
      customAlts: { ...prev.customAlts, [exDef.slot]: [...(prev.customAlts[exDef.slot] || []).filter((a) => a.id !== ex.id), altEntry] },
      subs: { ...prev.subs, [exDef.slot]: ex.id },
    }));
    setSession((s) => s.map((sessionEx, i) => {
      if (i !== exIdx) return sessionEx;
      return {
        exId: ex.id, slot: exDef.slot,
        weight: state.weights[ex.id] ?? ex.weight,
        sets: Array.from({ length: exDef.sets }, () => ({
          done: false, reps: ex.reps === "max" ? "" : ex.reps,
        })),
      };
    }));
  }

  function toggleSet(exIdx, setIdx) {
    setSession((s) => s.map((ex, i) => i !== exIdx ? ex : {
      ...ex, sets: ex.sets.map((set, j) => j !== setIdx ? set : { ...set, done: !set.done }),
    }));
  }

  function updateReps(exIdx, setIdx, val) {
    setSession((s) => s.map((ex, i) => i !== exIdx ? ex : {
      ...ex, sets: ex.sets.map((set, j) => j !== setIdx ? set : { ...set, reps: val }),
    }));
  }

  function updateSessionWeight(exIdx, dir) {
    setSession((s) => s.map((ex, i) => {
      if (i !== exIdx) return ex;
      const step = state.steps[ex.exId]?.step ?? 2.5;
      const next = Math.round((ex.weight + dir * step) * 100) / 100;
      return { ...ex, weight: Math.max(0, next) };
    }));
  }

  function finishWorkout() {
    const exercises = getDayExercises(activeDay, state.subs, state.customAlts);
    const newWeights = { ...state.weights };
    const changes = [];

    session.forEach((exSession, i) => {
      const ex = exercises.find((e) => e.id === exSession.exId) || exercises[i];
      if (!ex || ex.weight === null || ex.step === null) return;
      const cfg = state.steps[ex.id] || { step: ex.step, progressReps: ex.progressReps ?? ex.reps };
      const threshold = Number(cfg.progressReps ?? ex.reps);
      const allDone = exSession.sets.every((s) => s.done && Number(s.reps) >= threshold);
      if (allDone) {
        newWeights[ex.id] = Math.round((exSession.weight + cfg.step) * 100) / 100;
        changes.push({ name: ex.name, from: exSession.weight, to: newWeights[ex.id] });
      }
    });

    const record = {
      date: new Date().toISOString(),
      dateStr: new Date().toLocaleDateString("ru-RU"),
      day: activeDay, label: PROGRAM[activeDay].label,
      exercises: session.map((exSes, i) => {
        const exDef = exercises.find((e) => e.id === exSes.exId) || exercises[i];
        return { name: exDef?.name || exSes.exId, weight: exSes.weight, sets: exSes.sets };
      }),
    };

    setState((prev) => ({
      ...prev, weights: newWeights,
      history: [record, ...prev.history].slice(0, 200),
    }));

    if (changes.length) {
      showToast(`↑ ${changes.map((c) => `${c.name} ${c.from}→${c.to}kg`).join(" · ")}`, ACCENT[activeDay]);
    } else {
      showToast("Workout saved", "#666");
    }
    setView("home"); setSession(null); setActiveDay(null);
  }

  function updateStepCfg(exId, field, val) {
    setState((prev) => ({
      ...prev,
      steps: { ...prev.steps, [exId]: { ...prev.steps[exId], [field]: parseFloat(val) || prev.steps[exId]?.[field] } },
    }));
  }

  function updateWeight(exId, val) {
    const w = parseFloat(val);
    if (isNaN(w) || w < 0) return;
    setState((prev) => ({
      ...prev,
      weights: { ...prev.weights, [exId]: w },
    }));
  }

  function handleExport(rec) {
    copyText(formatWorkout(rec)).then((ok) => {
      showToast(ok ? "Copied" : "Copy failed", ok ? "#22c55e" : "#ef4444");
    });
  }

  function handleReset() {
    setState(DEFAULT_STATE);
    showToast("Data reset", "#ef4444");
    setConfirmReset(false);
  }

  if (!loaded) return (
    <div style={S.loadingScreen}>
      <div style={{ fontSize: 32, fontWeight: 800, letterSpacing: 6, color: "#222" }}>IRONLOG</div>
    </div>
  );

  return (
    <div style={S.root}>
      <style>{GLOBAL_CSS}</style>
      {toast && <div key={toast.msg} className="safe-toast" style={{ ...S.toast, borderColor: toast.color, color: toast.color }}>{toast.msg}</div>}

      {confirmReset && (
        <div style={S.overlay} onClick={() => setConfirmReset(false)}>
          <div style={S.modal} onClick={(e) => e.stopPropagation()}>
            <div style={{ fontSize: 18, fontWeight: 700, color: "#fff", marginBottom: 8 }}>Reset all data?</div>
            <div style={{ fontSize: 13, color: "#666", marginBottom: 24, lineHeight: 1.5 }}>Weights, history and settings will be deleted.</div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => setConfirmReset(false)} style={S.modalBtnCancel}>Cancel</button>
              <button onClick={handleReset} style={S.modalBtnDanger}>Reset</button>
            </div>
          </div>
        </div>
      )}

      {view === "home" && <HomeView state={state} onStart={startDay} onHistory={() => setView("history")} onSettings={() => setView("settings")} onReset={() => setConfirmReset(true)} />}
      {view === "workout" && session && <WorkoutView dayKey={activeDay} day={PROGRAM[activeDay]} session={session} state={state} onToggle={toggleSet} onReps={updateReps} onWeight={updateSessionWeight} onSwap={swapExercise} onAddAlt={addCustomAlt} onRemoveAlt={removeCustomAlt} onAdopt={adoptExercise} onFinish={finishWorkout} onBack={() => { setView("home"); setSession(null); setActiveDay(null); }} />}
      {view === "history" && <HistoryView history={state.history} onExport={handleExport} onBack={() => setView("home")} />}
      {view === "settings" && <SettingsView state={state} onUpdate={updateStepCfg} onUpdateWeight={updateWeight} onBack={() => setView("home")} />}
    </div>
  );
}

// ── HOME ─────────────────────────────────────────────────────────────────────
function HomeView({ state, onStart, onHistory, onSettings, onReset }) {
  const last = state.history[0];
  const streakDays = getStreak(state.history);
  return (
    <div className="safe-page" style={S.page}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 32 }}>
        <div>
          <div style={S.logo}>IRON<span style={{ color: "#22c55e" }}>LOG</span></div>
          <div style={S.subtitle}>hypertrophy · linear progression</div>
        </div>
        <button onClick={onSettings} style={S.iconBtn}>
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5">
            <circle cx="10" cy="10" r="3"/><path d="M10 1v2m0 14v2M1 10h2m14 0h2m-2.93-6.07-1.41 1.41M5.34 14.66l-1.41 1.41m0-12.14 1.41 1.41m9.32 9.32 1.41 1.41"/>
          </svg>
        </button>
      </div>

      {last && (
        <div style={{ ...S.card, padding: "12px 16px", marginBottom: 20, display: "flex", gap: 14, alignItems: "center" }}>
          <div style={{ color: ACCENT[last.day], fontSize: 18, opacity: 0.7 }}>↺</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 10, color: "#555", letterSpacing: 2, fontWeight: 600 }}>LAST WORKOUT</div>
            <div style={{ fontSize: 13, color: "#999", marginTop: 2 }}>{last.label} · {last.dateStr || last.date}</div>
          </div>
          {streakDays > 1 && <div style={{ fontSize: 12, color: "#22c55e", fontWeight: 700 }}>🔥{streakDays}</div>}
        </div>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 28 }}>
        {Object.entries(PROGRAM).map(([key, day]) => (
          <DayCard key={key} dayKey={key} day={day} state={state} onStart={onStart} />
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 20 }}>
        <StatBox label="WORKOUTS" value={state.history.length} />
        <StatBox label="LEG PRESS" value={`${state.weights.legpress_a ?? "—"}kg`} />
        <StatBox label="BENCH" value={`${state.weights.bench_a}kg`} accent={ACCENT.B} />

      <div style={{ display: "flex", gap: 10 }}>
        <button onClick={onHistory} style={S.secondaryBtn}>HISTORY</button>
        <button onClick={onReset} style={{ ...S.secondaryBtn, flex: "none", padding: "12px 16px", color: "#333" }}>↺</button>
      </div>
    </div>
  );
}

function DayCard({ dayKey, day, state, onStart }) {
  const accent = ACCENT[dayKey];
  const exercises = day.exercises.map((exDef) => resolveEx(exDef, state.subs, state.customAlts));
  return (
    <div onClick={() => onStart(dayKey)} style={{ ...S.card, padding: 0, cursor: "pointer", overflow: "hidden", borderLeft: `3px solid ${accent}` }}>
      <div style={{ padding: "16px 18px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
          <div style={{ fontSize: 24, fontWeight: 800, letterSpacing: 3, color: "#fff" }}>{day.label}</div>
          <div style={{ color: accent, fontSize: 14, opacity: 0.6 }}>→</div>
        </div>
        <div style={{ fontSize: 11, color: "#444", marginBottom: 14, letterSpacing: 1 }}>{day.muscles}</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
          {exercises.map((ex) => {
            const w = state.weights[ex.id];
            return (
              <div key={ex.id} style={{ background: "#18181b", borderRadius: 6, padding: "4px 10px", display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ fontSize: 11, color: "#666" }}>{ex.name}</span>
                {w != null && <span style={{ fontSize: 11, color: accent, fontWeight: 700 }}>{w}</span>}

}

function StatBox({ label, value, accent: color }) {
  return (
    <div style={S.card}>
      <div style={{ fontSize: 9, color: "#444", letterSpacing: 2, marginBottom: 6, fontWeight: 600 }}>{label}</div>
      <div style={{ fontSize: 22, fontWeight: 800, color: color || "#e0e0e0", letterSpacing: 1 }}>{value}</div>
    </div>

}

// ── WORKOUT ──────────────────────────────────────────────────────────────────
function WorkoutView({ dayKey, day, session, state, onToggle, onReps, onWeight, onSwap, onAddAlt, onRemoveAlt, onAdopt, onFinish, onBack }) {
  const accent = ACCENT[dayKey];
  const total = session.reduce((s, ex) => s + ex.sets.length, 0);
  const done = session.reduce((s, ex) => s + ex.sets.filter((st) => st.done).length, 0);
  const pct = total > 0 ? done / total : 0;
  const exercises = day.exercises.map((exDef) => resolveEx(exDef, state.subs, state.customAlts));
  const [swapOpen, setSwapOpen] = useState(null);
  const [addingAlt, setAddingAlt] = useState(null);
  const [newAltName, setNewAltName] = useState("");
  const timerRef = useRef(null);

  function handleToggle(exIdx, setIdx) {
    const set = session[exIdx].sets[setIdx];
    onToggle(exIdx, setIdx);
    // Restart timer when marking a set as done
    if (!set.done && timerRef.current) timerRef.current();
  }

  return (
    <div style={{ ...S.page, paddingBottom: 110, paddingTop: 0 }}>
      <div className="sticky-header">
        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 6 }}>
          <button onClick={onBack} style={S.iconBtn}>←</button>
          <div style={{ flex: 1, fontSize: 28, fontWeight: 800, letterSpacing: 3, color: "#fff" }}>{day.label}</div>
          <div style={{ fontFamily: "monospace", fontSize: 14, color: accent, fontWeight: 700 }}>{done}/{total}</div>
        </div>

        <div style={{ height: 3, background: "#1a1a1e", borderRadius: 2, marginBottom: 10, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${pct * 100}%`, background: accent, borderRadius: 2, transition: "width 0.4s cubic-bezier(0.22, 1, 0.36, 1)" }} />
        </div>

        <RestTimer accent={accent} restartRef={timerRef} />
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 14, marginTop: 14 }}>
        {session.map((exSession, exIdx) => {
          const ex = exercises[exIdx];
          const exDef = day.exercises[exIdx];
          const cfg = state.steps?.[ex.id] || { step: ex.step, progressReps: ex.progressReps ?? ex.reps };
          const isMax = ex.reps === "max";
          const allDone = exSession.sets.every((s) => s.done);
          const hasWeight = exSession.weight != null;
          const allAlts = [...exDef.alts, ...(state.customAlts?.[exDef.slot] || [])];

          return (
            <div key={exIdx} style={{
              ...S.card,
              borderColor: allDone ? accent + "55" : "#1e1e22",
              transition: "border-color 0.3s, box-shadow 0.3s",
              boxShadow: allDone ? `0 0 20px ${accent}10` : "none",
            }}>
              {/* Header */}
              <div style={{ marginBottom: 12 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                  <div style={{ fontSize: 17, fontWeight: 800, letterSpacing: 1, color: allDone ? accent : "#fff", transition: "color 0.3s", flex: 1 }}>
                    {ex.name}
                  </div>
                  <button onClick={() => { setSwapOpen(swapOpen === exIdx ? null : exIdx); setAddingAlt(null); }} style={{
                    background: swapOpen === exIdx ? accent + "20" : "#18181b",
                    border: `1px solid ${swapOpen === exIdx ? accent + "44" : "#2a2a2e"}`,
                    color: swapOpen === exIdx ? accent : "#555",
                    borderRadius: 6, padding: "3px 8px", cursor: "pointer",
                    fontSize: 11, fontFamily: "inherit", fontWeight: 600,
                  }}>⇄</button>
                  {hasWeight && (
                    <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                      <button style={S.weightBtn} onClick={() => onWeight(exIdx, -1)}>−</button>
                      <span style={{ fontFamily: "monospace", fontSize: 14, fontWeight: 700, color: accent, minWidth: 46, textAlign: "center" }}>
                        {exSession.weight}
                      </span>
                      <button style={S.weightBtn} onClick={() => onWeight(exIdx, +1)}>+</button>
                    </div>
                  )}
                </div>
                <div style={{ fontSize: 10, color: "#444", fontFamily: "monospace" }}>
                  {ex.sets}×{isMax ? "MAX" : ex.reps}
                  {hasWeight && cfg.step && ` · step ${cfg.step}kg`}
                  {hasWeight && cfg.progressReps && cfg.progressReps !== ex.reps && ` · ≥${cfg.progressReps}r`}
                </div>
              </div>

              {/* Swap picker */}
              {swapOpen === exIdx && (() => {
                const customIds = (state.customAlts?.[exDef.slot] || []);
                const isInCustom = (id) => customIds.some((a) => a.id === id);
                const otherExercises = ALL_EXERCISES.filter((e) => !allAlts.find((a) => a.name === e.name));
                return (
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14, padding: "10px 12px", background: "#0c0c0e", borderRadius: 8, border: "1px solid #1e1e22" }}>
                  {allAlts.map((alt) => {
                    const active = ex.id === alt.id;
                    const removable = isInCustom(alt.id) && !active;
                    return (
                      <div key={alt.id} style={{ display: "flex", alignItems: "center" }}>
                        <button onClick={() => { onSwap(exIdx, alt.id); setSwapOpen(null); setAddingAlt(null); }}
                          style={{
                            padding: "8px 14px", borderRadius: removable ? "8px 0 0 8px" : 8, cursor: "pointer",
                            background: active ? accent + "20" : "#18181b",
                            border: `1px solid ${active ? accent : "#2a2a2e"}`,
                            color: active ? accent : "#888",
                            fontSize: 13, fontWeight: 600, fontFamily: "inherit",
                          }}>
                          {alt.name}
                        </button>
                        {removable && (
                          <button onClick={() => onRemoveAlt(exDef.slot, alt.id)}
                            style={{ background: "#18181b", border: "1px solid #2a2a2e", borderLeft: "none", color: "#444", borderRadius: "0 8px 8px 0", padding: "8px 8px", cursor: "pointer", fontSize: 12, fontFamily: "inherit" }}>×</button>
                        )}
                      </div>
                    );
                  })}

                  {otherExercises.length > 0 && (
                    <>
                      <div style={{ width: "100%", borderTop: "1px solid #1e1e22", marginTop: 2, paddingTop: 8 }}>
                        <div style={{ fontSize: 9, color: "#555", letterSpacing: 2, fontWeight: 600 }}>ALL EXERCISES</div>
                      </div>
                      {otherExercises.map((other) => (
                        <button key={other.id} onClick={() => { onAdopt(exIdx, other); setSwapOpen(null); setAddingAlt(null); }}
                          style={{ padding: "6px 10px", borderRadius: 6, cursor: "pointer", background: "#18181b", border: "1px solid #1e1e22", color: "#555", fontSize: 11, fontWeight: 600, fontFamily: "inherit" }}>
                          {other.name}
                        </button>
                      ))}
                    </>
                  )}

                  {addingAlt === exIdx ? (
                    <form onSubmit={(e) => { e.preventDefault(); if (newAltName.trim()) { onAddAlt(exIdx, newAltName.trim()); setAddingAlt(null); setNewAltName(""); setSwapOpen(null); }}} style={{ display: "flex", gap: 6, width: "100%", marginTop: 4 }}>
                      <input value={newAltName} onChange={(e) => setNewAltName(e.target.value)} placeholder="Exercise name"
                        autoFocus style={{ flex: 1, background: "#18181b", border: "1px solid #2a2a2e", color: "#ccc", padding: "8px 12px", borderRadius: 8, fontSize: 16, fontFamily: "inherit", outline: "none" }} />
                      <button type="submit" style={{ background: accent + "20", border: `1px solid ${accent}`, color: accent, borderRadius: 8, padding: "8px 12px", cursor: "pointer", fontSize: 13, fontWeight: 700, fontFamily: "inherit" }}>OK</button>
                    </form>
                  ) : (
                    <button onClick={() => { setAddingAlt(exIdx); setNewAltName(""); }}
                      style={{ padding: "8px 14px", borderRadius: 8, cursor: "pointer", background: "#18181b", border: "1px dashed #2a2a2e", color: "#555", fontSize: 13, fontWeight: 600, fontFamily: "inherit" }}>+</button>
                  )}
                </div>
                );
              })()}

              {/* Sets */}
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {exSession.sets.map((set, setIdx) => {
                  const target = isMax ? null : Number(ex.reps);
                  const actual = Number(set.reps) || 0;
                  const belowTarget = target && set.done && actual < target;
                  return (
                    <div key={setIdx} style={{
                      display: "flex", alignItems: "center", gap: 10,
                      padding: "4px 0",
                    }}>
                      <div style={{
                        width: 20, fontSize: 11, fontFamily: "monospace", fontWeight: 600,
                        color: set.done ? (belowTarget ? "#ef4444" : accent) : "#333",
                        textAlign: "center", flexShrink: 0,
                      }}>
                        {setIdx + 1}
                      </div>
                      <div style={{
                        display: "flex", alignItems: "center", flex: 1,
                        background: "#18181b", borderRadius: 8, overflow: "hidden",
                        border: `1px solid ${belowTarget ? "#ef444466" : "#2a2a2e"}`,
                        height: 36,
                      }}>
                        <button onClick={() => onReps(exIdx, setIdx, Math.max(0, actual - 1))} style={S.repStepBtn}>−</button>
                        <div style={{
                          flex: 1, textAlign: "center",
                          fontSize: 15, fontWeight: 700, fontFamily: "monospace",
                          color: belowTarget ? "#ef4444" : (set.reps === "" ? "#333" : "#ccc"),
                        }}>
                          {set.reps === "" ? "—" : actual}
                        </div>
                        <button onClick={() => onReps(exIdx, setIdx, actual + 1)} style={S.repStepBtn}>+</button>
                      </div>
                      <button onClick={() => handleToggle(exIdx, setIdx)} style={{
                        width: 40, height: 36, borderRadius: 8, cursor: "pointer", flexShrink: 0,
                        background: set.done ? (belowTarget ? "#ef444430" : accent) : "#18181b",
                        border: `2px solid ${set.done ? (belowTarget ? "#ef4444" : accent) : "#2a2a2e"}`,
                        color: set.done ? (belowTarget ? "#ef4444" : "#000") : "#555",
                        fontSize: 13, fontWeight: 800, fontFamily: "inherit", transition: "all 0.15s",
                        display: "flex", alignItems: "center", justifyContent: "center",
                      }}>
                        {set.done ? "✓" : ""}
                      </button>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      <div style={S.bottomBar}>
        <div style={{ maxWidth: 480, margin: "0 auto" }}>
          <button onClick={onFinish} style={{
            width: "100%", padding: "16px",
            background: pct === 1 ? accent : "transparent",
            border: `2px solid ${accent}`, color: pct === 1 ? "#000" : accent,
            fontSize: 15, fontWeight: 800, letterSpacing: 4,
            borderRadius: 12, cursor: "pointer", transition: "all 0.3s", fontFamily: "inherit",
          }}>
            {pct === 1 ? "✓ FINISH" : "SAVE"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── SETTINGS ─────────────────────────────────────────────────────────────────
function SettingsView({ state, onUpdate, onUpdateWeight, onBack }) {
  const byDay = {};
  Object.entries(PROGRAM).forEach(([key, day]) => {
    day.exercises.forEach((exDef) => {
      const list = exDef.alts.filter((a) => a.weight !== null && a.step !== null);
      // Include custom alts for this slot
      const custom = (state.customAlts?.[exDef.slot] || []).filter((a) => a.weight !== null && a.step !== null);
      [...list, ...custom].forEach((ex) => {
        if (!byDay[key]) byDay[key] = { label: day.label, exercises: [] };
        if (!byDay[key].exercises.find((e) => e.id === ex.id)) byDay[key].exercises.push(ex);
      });
    });
  });

  return (
    <div className="safe-page" style={S.page}>
      <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 28 }}>
        <button onClick={onBack} style={S.iconBtn}>←</button>
        <div style={{ fontSize: 28, fontWeight: 800, letterSpacing: 3, color: "#fff" }}>SETTINGS</div>
      </div>
      <div style={{ fontSize: 10, color: "#444", letterSpacing: 3, fontWeight: 600, marginBottom: 20 }}>CURRENT WEIGHTS & PROGRESSION</div>

      {Object.entries(byDay).map(([key, { label, exercises }]) => (
        <div key={key} style={{ marginBottom: 24 }}>
          <div style={{ fontSize: 10, color: ACCENT[key], letterSpacing: 3, fontWeight: 700, marginBottom: 12, paddingBottom: 8, borderBottom: "1px solid #1a1a1e" }}>
            {label.toUpperCase()}
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {exercises.map((ex) => {
              const cfg = state.steps[ex.id] || { step: ex.step, progressReps: ex.progressReps ?? ex.reps };
              const currentWeight = state.weights[ex.id] ?? ex.weight;
              return (
                <div key={ex.id} style={S.card}>
                  <div style={{ fontSize: 16, fontWeight: 800, letterSpacing: 2, color: "#bbb", marginBottom: 12 }}>{ex.name}</div>
                  <div style={{ display: "flex", gap: 12 }}>
                    <NumField label="WEIGHT" value={currentWeight} hint="kg" onChange={(v) => onUpdateWeight(ex.id, v)} accent={ACCENT[key]} />
                    <NumField label="STEP" value={cfg.step} hint="increment" onChange={(v) => onUpdate(ex.id, "step", v)} accent={ACCENT[key]} />
                    <NumField label="MIN R" value={cfg.progressReps ?? ex.reps} hint="threshold" onChange={(v) => onUpdate(ex.id, "progressReps", v)} accent={ACCENT[key]} />
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}

      <div style={{ ...S.card, fontSize: 11, color: "#444", lineHeight: 2 }}>
        <div><span style={{ color: "#666" }}>Step</span> — increment on clean completion</div>
        <div><span style={{ color: "#666" }}>Min reps</span> — each set must be ≥ this number</div>
        <div style={{ marginTop: 8, fontSize: 10, color: "#333" }}>Life Fitness stack: 3.75kg · Vertical/Compound Row: 10kg · Cable Crunches: 3.75kg · Bicep: 1kg</div>
      </div>
    </div>
  );
}

function NumField({ label, value, hint, onChange, accent = "#22c55e" }) {
  const [local, setLocal] = useState(String(value));
  useEffect(() => setLocal(String(value)), [value]);
  return (
    <div style={{ flex: 1 }}>
      <div style={{ fontSize: 9, color: "#444", letterSpacing: 2, marginBottom: 6, fontWeight: 600 }}>{label}</div>
      <input type="number" inputMode="decimal" value={local} step="0.5"
        onChange={(e) => setLocal(e.target.value)} onBlur={() => onChange(local)}
        style={{ width: "100%", background: "#18181b", border: "1px solid #2a2a2e", color: accent, padding: "10px 12px", borderRadius: 8, fontFamily: "monospace", fontSize: 16, fontWeight: 700 }}
      />
      <div style={{ fontSize: 9, color: "#333", marginTop: 4 }}>{hint}</div>
    </div>
  );
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function getStreak(history) {
  if (!history.length) return 0;
  let count = 0;
  const now = new Date();
  for (let i = 0; i < history.length; i++) {
    const d = new Date(history[i].date);
    if (isNaN(d.getTime())) continue;
    const diff = Math.floor((now - d) / 86400000);
    if (diff <= count + 2) count++;
    else break;
  }
  return count;
}
